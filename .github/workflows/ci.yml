name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p chunkstore-core --all-targets -- -D warnings

      - name: Test
        run: cargo test -p chunkstore-core

      - name: Workload analysis
        run: cargo run -p chunkstore-core --example workload_analysis --release

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and test Python wrapper
        working-directory: python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest
          .venv/bin/maturin develop --release
          .venv/bin/pytest -q -m "not cross_lang and not s3"

  python-s3:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT_URL: http://127.0.0.1:9000
      S3_BUCKET: chunkstore-ci
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-12-18T13-15-44Z server /data
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9000/minio/health/live; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 2
          done
          docker logs minio || true
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: S3 backend integration tests (MinIO)
        working-directory: python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest "boto3>=1.34"
          .venv/bin/maturin develop --release
          .venv/bin/pytest -m s3 -q

  cross-lang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build core library
        run: CARGO_TARGET_DIR=target cargo build --release -p chunkstore-core

      - name: Cross-language integration test
        working-directory: python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest
          .venv/bin/maturin develop --release
          .venv/bin/pytest -m cross_lang -q

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build core library
        run: CARGO_TARGET_DIR=target cargo build --release -p chunkstore-core

      - name: Test Go wrapper
        working-directory: go/chunkstore
        run: go test -v

  go-s3:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT_URL: http://127.0.0.1:9000
      S3_BUCKET: chunkstore-ci-go
    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-12-18T13-15-44Z server /data
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9000/minio/health/live; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 2
          done
          docker logs minio || true
          exit 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build core library
        run: CARGO_TARGET_DIR=target cargo build --release -p chunkstore-core

      - name: Go S3 backend integration tests (MinIO)
        working-directory: go/chunkstore
        run: go test -v -tags s3 -run 'TestS3'

      - name: Test Go HTTP example
        working-directory: examples/go-http
        run: go test -v

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: License and advisory check
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit
