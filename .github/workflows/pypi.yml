name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: Publish to TestPyPI instead of PyPI
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-sdist
          path: python/dist/*

  build-wheels-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-linux-${{ matrix.target }}
          path: python/dist/*

  build-wheels-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: universal2-apple-darwin
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-macos-universal2
          path: python/dist/*

  build-wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: x64
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-windows-x64
          path: python/dist/*

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels-linux
      - build-wheels-macos
      - build-wheels-windows
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.testpypi) && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: dist

      - name: List dist artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: ${{ (github.event_name == 'workflow_dispatch' && inputs.testpypi) && 'https://test.pypi.org/legacy/' || '' }}
