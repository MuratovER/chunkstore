name: Publish to PyPI

# release.yml creates GitHub Releases with GITHUB_TOKEN, which does not emit a
# release:published event other workflows can see. workflow_run chains publish
# after Release when a new tag was created on that commit.
on:
  release:
    types: [published]
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      testpypi:
        description: Publish to TestPyPI instead of PyPI
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  gate:
    name: Decide whether to publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      publish: ${{ steps.out.outputs.publish }}
      ref: ${{ steps.out.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          HEAD="${{ github.event.workflow_run.head_sha }}"
          if [ "$(git rev-parse "$TAG" 2>/dev/null || true)" = "$HEAD" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
            echo "New release $TAG on $HEAD — will publish."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "No new release on $HEAD — skip publish."
          fi

  build-sdist:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-sdist
          path: python/dist/*

  build-wheels-linux:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-linux-${{ matrix.target }}
          path: python/dist/*

  build-wheels-macos:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: universal2-apple-darwin
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-macos-universal2
          path: python/dist/*

  build-wheels-windows:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: x64
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: package-wheel-windows-x64
          path: python/dist/*

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs:
      - gate
      - build-sdist
      - build-wheels-linux
      - build-wheels-macos
      - build-wheels-windows
    if: needs.gate.outputs.publish == 'true'
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.testpypi) && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: dist

      - name: List dist artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: ${{ (github.event_name == 'workflow_dispatch' && inputs.testpypi) && 'https://test.pypi.org/legacy/' || '' }}
