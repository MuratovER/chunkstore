name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Decide whether to publish
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      publish: ${{ steps.out.outputs.publish }}
      ref: ${{ steps.out.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "release" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            else
              echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          HEAD="${{ github.event.workflow_run.head_sha }}"
          if [ "$(git rev-parse "$TAG" 2>/dev/null || true)" = "$HEAD" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
            echo "New release $TAG on $HEAD — will publish."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "No new release on $HEAD — skip publish."
          fi

  publish:
    name: Publish chunkstore-core
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crate
        run: cargo publish -p chunkstore-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
