<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#fafafa"/>
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111">How a file becomes deduplicated storage</text>
  <rect x="40" y="80" width="120" height="56" fill="#e3f2fd" stroke="#1565c0" rx="8"/>
  <text x="100" y="112" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">File upload</text>
  <path d="M160 108 H200" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <rect x="200" y="80" width="120" height="56" fill="#fff3e0" stroke="#ef6c00" rx="8"/>
  <text x="260" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100">Chunker</text>
  <text x="260" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">Fixed / CDC</text>
  <path d="M320 108 H360" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <rect x="360" y="80" width="120" height="56" fill="#f3e5f5" stroke="#7b1fa2" rx="8"/>
  <text x="420" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4a148c">SHA-256</text>
  <text x="420" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">64-char hex</text>
  <path d="M480 108 H520" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <rect x="520" y="68" width="140" height="76" fill="#e8f5e9" stroke="#2e7d32" rx="8"/>
  <text x="590" y="96" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1b5e20">Backend</text>
  <text x="590" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">FS / S3</text>
  <text x="590" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">chunk blobs</text>
  <rect x="200" y="200" width="180" height="72" fill="#fff" stroke="#455a64" stroke-dasharray="6" rx="8"/>
  <text x="290" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#37474f">Manifest</text>
  <text x="290" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">file_id - digests</text>
  <text x="290" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">_manifest/{id}</text>
  <rect x="420" y="200" width="180" height="72" fill="#fff" stroke="#455a64" stroke-dasharray="6" rx="8"/>
  <text x="510" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#37474f">Refcount</text>
  <text x="510" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">digest - count</text>
  <text x="510" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">_refcount/{digest}</text>
  <path d="M590 144 V180 H510 V200" stroke="#2e7d32" stroke-width="1.5" fill="none"/>
  <path d="M420 136 V170 H290 V200" stroke="#2e7d32" stroke-width="1.5" fill="none"/>
  <text x="400" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">Delete file: refcount-- then GC chunks at zero</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#666"/></marker></defs>
</svg>
