<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400">
  <rect width="720" height="400" fill="#fafafa"/>
  <text x="360" y="34" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#111">Prefix insert (+1 byte): chunk alignment</text>
  <text x="360" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">20 MiB file, second version prepends one byte</text>
  <text x="180" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Fixed 4 MiB</text>
  <text x="180" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c62828">0% savings - all chunks shift</text>
  <rect x="40" y="120" width="280" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <text x="50" y="138" font-family="monospace" font-size="10" fill="#b71c1c">v1 chunk 1</text>
  <rect x="40" y="152" width="280" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <rect x="40" y="184" width="280" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <rect x="40" y="216" width="280" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <rect x="40" y="248" width="280" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <text x="180" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">v2: new boundary at byte 0</text>
  <text x="180" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">every 4 MiB block is different</text>
  <text x="540" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">CDC (FastCDC)</text>
  <text x="540" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2e7d32">45% savings - 4/5 chunks reused</text>
  <rect x="400" y="120" width="55" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <text x="405" y="138" font-family="monospace" font-size="9" fill="#b71c1c">new</text>
  <rect x="455" y="120" width="225" height="28" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="465" y="138" font-family="monospace" font-size="9" fill="#1b5e20">shared chunk 1</text>
  <rect x="400" y="152" width="280" height="28" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="410" y="170" font-family="monospace" font-size="9" fill="#1b5e20">shared chunk 2</text>
  <rect x="400" y="184" width="280" height="28" fill="#c8e6c9" stroke="#2e7d32"/>
  <rect x="400" y="216" width="280" height="28" fill="#c8e6c9" stroke="#2e7d32"/>
  <rect x="400" y="248" width="225" height="28" fill="#c8e6c9" stroke="#2e7d32"/>
  <rect x="625" y="248" width="55" height="28" fill="#ffcdd2" stroke="#c62828"/>
  <text x="540" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Content-defined boundaries survive</text>
  <text x="540" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">the edit at the file start</text>
  <rect x="200" y="350" width="16" height="16" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="222" y="362" font-family="sans-serif" font-size="11" fill="#333">Reused chunk (refcount++)</text>
  <rect x="400" y="350" width="16" height="16" fill="#ffcdd2" stroke="#c62828"/>
  <text x="422" y="362" font-family="sans-serif" font-size="11" fill="#333">New unique chunk</text>
</svg>
